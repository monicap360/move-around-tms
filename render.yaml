services:
  - type: web
    name: move-around-tms
    env: node
    plan: starter
    runtime: node
    numInstances: 1
    buildCommand: npm ci && npm run build 2>&1
    startCommand: npm run start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=3072"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_DEMO_MODE
        value: "false"
      # Shared secret the daily-backup cron uses to call /api/cron/backup.
      # Set the SAME value here and on the ronyx-daily-backup cron below.
      - key: CRON_SECRET
        sync: false

  # Daily automated backup → Supabase Storage (calls the secret-protected endpoint).
  # Set CRON_SECRET (same as above) and BACKUP_ENDPOINT (= https://<your-app>/api/cron/backup).
  - type: cron
    name: ronyx-daily-backup
    runtime: node
    schedule: "0 8 * * *"   # 08:00 UTC daily (~3 AM ET / 2 AM CT)
    buildCommand: "echo 'no build needed — cron only calls the app endpoint'"
    startCommand: >-
      node -e "fetch(process.env.BACKUP_ENDPOINT,{method:'POST',headers:{authorization:'Bearer '+process.env.CRON_SECRET}}).then(async r=>{const t=await r.text();console.log('backup',r.status,t);if(!r.ok)process.exit(1)}).catch(e=>{console.error(e);process.exit(1)})"
    autoDeploy: true
    envVars:
      - key: BACKUP_ENDPOINT
        sync: false
      - key: CRON_SECRET
        sync: false

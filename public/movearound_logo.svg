<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 72" width="372" height="72" role="img" aria-label="MoveAround TMS">
  <defs>
    <linearGradient id="ma-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2f8"/>
      <stop offset="0.5" stop-color="#b9c2d0"/>
      <stop offset="1" stop-color="#8791a2"/>
    </linearGradient>
    <linearGradient id="ma-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- MA monogram -->
  <text x="0" y="52" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="56" letter-spacing="-2">
    <tspan fill="#e8eefb">M</tspan><tspan fill="url(#ma-silver)">A</tspan>
  </text>
  <!-- road swoosh through the monogram -->
  <path d="M4 62 C 26 40, 58 40, 86 26" fill="none" stroke="url(#ma-blue)" stroke-width="7" stroke-linecap="round"/>
  <path d="M8 60 C 28 42, 58 42, 82 30" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-dasharray="4 5" stroke-linecap="round" opacity="0.9"/>

  <!-- wordmark -->
  <text x="98" y="38" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="24" letter-spacing="0.5">
    <tspan fill="#ffffff">MOVEAROUND</tspan><tspan fill="#60a5fa" dx="6">TMS</tspan>
  </text>
  <line x1="99" y1="49" x2="360" y2="49" stroke="#2563eb" stroke-width="1.5" opacity="0.6"/>
  <text x="99" y="63" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="10" letter-spacing="3" fill="#94a3b8">MOVE SMARTER. DELIVER BETTER.</text>
</svg>
